<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>光阴簿 · 统计</title>
<style>
/* Google Fonts removed */
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
  background: linear-gradient(160deg, #f8f5ff 0%, #eef4ff 30%, #f0f7fb 60%, #faf6ff 100%);
  min-height: 100vh; padding: 32px 20px; color: #1a1333;
  -webkit-font-smoothing: antialiased;
}
.wrap { max-width:960px; margin:0 auto; }
.back-link {
  display:inline-flex; align-items:center; gap:4px; margin-bottom:14px; font-size:13px;
  color:#7c6ff7; text-decoration:none; font-weight:600; padding:6px 12px; border-radius:10px;
  transition:background .15s;
}
.back-link:hover { background:rgba(124,111,247,0.08); }

h1 { font-size:24px; margin-bottom:24px; text-align:center; color:#2d1f4e; font-weight:800; }

/* Top stats row */
.top-row { display:grid; grid-template-columns:repeat(4,1fr); gap:14px; margin-bottom:20px; }
.stat-card {
  background: rgba(255,255,255,0.8); backdrop-filter: blur(20px);
  border: 1px solid rgba(255,255,255,0.9); border-radius:18px; padding:22px 20px;
  text-align:center; box-shadow: 0 2px 20px rgba(100,80,180,0.05);
}
.stat-num { font-size:40px; font-weight:800; color:#7c6ff7; line-height:1.1; }
.stat-label { font-size:12px; color:#a89cc4; margin-top:4px; }
.stat-sub { font-size:11px; color:#c8bdd8; margin-top:2px; }

/* Cards */
.chart-card {
  background: rgba(255,255,255,0.8); backdrop-filter: blur(20px);
  border: 1px solid rgba(255,255,255,0.9); border-radius:18px; padding:26px 28px;
  box-shadow: 0 2px 20px rgba(100,80,180,0.05); margin-bottom:16px;
}
.chart-card h2 { font-size:16px; color:#2d1f4e; margin-bottom:18px; font-weight:700; }

.bar-row { display:flex; align-items:center; gap:12px; margin-bottom:8px; }
.bar-label { width:56px; font-size:13px; color:#888; text-align:right; flex-shrink:0; }
.bar-track { flex:1; height:26px; background:#ede8f8; border-radius:13px; overflow:hidden; }
.bar-fill { height:100%; border-radius:13px; display:flex; align-items:center; padding-left:10px; }
.bar-fill span { font-size:11px; color:#fff; font-weight:700; }

.two-col { display:grid; grid-template-columns:1fr 1fr; gap:16px; margin-bottom:16px; }

/* Heatmap */
.heatmap { display:flex; gap:2px; }
.heat-col { flex:1; display:flex; flex-direction:column; gap:2px; }
.heat-cell { aspect-ratio:1; border-radius:3px; position:relative; }
.heat-cell[title]:hover::after {
  content:attr(title); position:absolute; bottom:100%; left:50%; transform:translateX(-50%);
  background:#1a1033; color:#fff; font-size:10px; padding:2px 8px; border-radius:4px;
  white-space:nowrap; z-index:10; pointer-events:none;
}
.heat-legend { display:flex; gap:4px; align-items:center; justify-content:flex-end; margin-top:6px; font-size:10px; color:#c8bdd8; }

/* Trend */
.trend-line { position:relative; height:120px; }
.trend-svg { width:100%; height:100%; }

.empty { text-align:center; color:#d5cee0; padding:30px; font-size:14px; }
.range-btn {
  padding:6px 14px; border:1.5px solid #e2dcf5; border-radius:8px;
  background:#fff; color:#888; font-size:12px; cursor:pointer; font-weight:600;
  transition:all .15s;
}
.range-btn:hover { border-color:#7c6ff7; color:#7c6ff7; }
.range-btn.active { background:#7c6ff7; color:#fff; border-color:#7c6ff7; }
</style>
</head>
<body>
<div class="wrap">

<a class="back-link" href="index.html">
  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
  回到光阴簿
</a>

<h1>📊 统计</h1>

<div style="display:flex; gap:8px; justify-content:center; margin-bottom:20px; flex-wrap:wrap; align-items:center;">
  <button class="range-btn active" onclick="setRange('today')">今天</button>
  <button class="range-btn" onclick="setRange('yesterday')">昨天</button>
  <button class="range-btn" onclick="setRange('week')">本周</button>
  <button class="range-btn" onclick="setRange('month')">本月</button>
  <button class="range-btn" onclick="setRange('all')">全部</button>
  <span style="color:#c8bdd8;margin:0 4px;">|</span>
  <span style="font-size:12px;color:#888;">自定义:</span>
  <input type="date" id="fromDate" onchange="setRange('custom')" style="padding:6px 10px;border:1.5px solid #e2dcf5;border-radius:8px;font-size:12px;background:#faf8ff;outline:none;">
  <span style="font-size:12px;color:#888;">至</span>
  <input type="date" id="toDate" onchange="setRange('custom')" style="padding:6px 10px;border:1.5px solid #e2dcf5;border-radius:8px;font-size:12px;background:#faf8ff;outline:none;">
</div>

<div class="top-row" id="topStats"></div>
<div class="chart-card">
  <h2>📅 本周每日番茄</h2>
  <div id="weekChart"></div>
</div>
<div class="two-col">
  <div class="chart-card">
    <h2>🔥 活跃时段</h2>
    <div id="heatmap"></div>
    <div class="heat-legend"><span>少</span><span style="display:inline-block;width:10px;height:10px;border-radius:2px;background:#ede8f8;"></span><span style="display:inline-block;width:10px;height:10px;border-radius:2px;background:#c4b5fd;"></span><span style="display:inline-block;width:10px;height:10px;border-radius:2px;background:#7c6ff7;"></span><span style="display:inline-block;width:10px;height:10px;border-radius:2px;background:#5b21b6;"></span><span>多</span></div>
  </div>
  <div class="chart-card">
    <h2>⏱ 专注总时长</h2>
    <div id="totalFocus"></div>
  </div>
</div>
<div class="chart-card">
  <h2>📈 最近 7 天趋势</h2>
  <div id="trendChart"></div>
</div>
<div class="chart-card">
  <h2>📋 专注明细</h2>
  <div id="drillDown"></div>
</div>
<div class="chart-card">
  <h2>🏆 任务完成排行</h2>
  <div id="taskRank"></div>
</div>

<a class="back-link" href="index.html" style="display:block;text-align:center;width:fit-content;margin:0 auto;">← 回到光阴簿</a>
</div>

<script src="data.js"></script>
<script>
let dateRange = 'today';
let filterStart = null, filterEnd = null;

function setRange(r) {
  dateRange = r;
  document.querySelectorAll('.range-btn').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
  const now = new Date(); now.setHours(0,0,0,0);
  if (r === 'today') { filterStart = new Date(now); filterEnd = new Date(now.getTime()+86400000); }
  else if (r === 'yesterday') { filterStart = new Date(now.getTime()-86400000); filterEnd = new Date(now); }
  else if (r === 'week') { const d = now.getDay(); filterStart = new Date(now.getTime()-(d===0?6:d-1)*86400000); filterEnd = new Date(); }
  else if (r === 'month') { filterStart = new Date(now.getFullYear(), now.getMonth(), 1); filterEnd = new Date(); }
  else if (r === 'custom') {
    filterStart = document.getElementById('fromDate').value ? new Date(document.getElementById('fromDate').value) : null;
    filterEnd = document.getElementById('toDate').value ? new Date(document.getElementById('toDate').value+'T23:59:59') : null;
  }
  else { filterStart = null; filterEnd = null; }
  renderStats();
}

function filteredLog() {
  if (!filterStart && !filterEnd) return sessionLog;
  return sessionLog.filter(e => {
    const ts = e.ts;
    if (filterStart && ts < filterStart.getTime()) return false;
    if (filterEnd && ts > filterEnd.getTime()) return false;
    return true;
  });
}

function renderStats() {
const log = filteredLog();
const sdata = data;

function countPomodoros(log) { return log.filter(e => e.msg.includes('Work完成')).length; }
function countEarlyPomodoros(log) { return log.filter(e => e.msg.includes('Work完成') && e.msg.includes('提前结束')).length; }
function countNormalPomodoros(log) { return log.filter(e => e.msg.includes('Work完成') && !e.msg.includes('提前结束')).length; }

function todayPomodoros(log) {
  const today = new Date().toLocaleDateString('zh-CN');
  return log.filter(e => new Date(e.ts).toLocaleDateString('zh-CN') === today && e.msg.includes('Work完成')).length;
}

function weekPomodoros(log) {
  const now = new Date();
  const weekAgo = new Date(now.getTime() - 7*86400000);
  return log.filter(e => e.ts > weekAgo.getTime() && e.msg.includes('Work完成')).length;
}

function currentStreak(log) {
  let streak = 0;
  const now = new Date();
  for (let i = 0; i < 365; i++) {
    const d = new Date(now); d.setDate(d.getDate() - i);
    const key = d.toLocaleDateString('zh-CN');
    const has = log.some(e => new Date(e.ts).toLocaleDateString('zh-CN') === key && e.msg.includes('Work完成'));
    if (has) streak++;
    else break;
  }
  return streak;
}

function totalFocusMin(log) {
  let min = 0;
  log.forEach(e => {
    const m = e.msg.match(/Work完成.*?(\d+)分钟/);
    if (m) min += parseInt(m[1]);
  });
  return min;
}

function avgPomodorosPerTask(log) {
  const done = log.filter(e => e.msg.includes('🎉 完成')).length;
  const poms = countPomodoros(log);
  return done > 0 ? (poms / done).toFixed(1) : 0;
}

// ── Heatmap data ──
function buildHeatmap(log) {
  const grid = Array(7).fill(null).map(() => Array(24).fill(0));
  log.forEach(e => {
    if (!e.msg.includes('Work完成')) return;
    const d = new Date(e.ts);
    const day = d.getDay(); // 0=Sun
    const hour = d.getHours();
    grid[day][hour]++;
  });
  return grid;
}

// ── Weekly bar ──
function weekDaily(log) {
  const days = [];
  for (let i = 6; i >= 0; i--) {
    const d = new Date(); d.setDate(d.getDate() - i);
    const key = d.toLocaleDateString('zh-CN');
    const label = ['日','一','二','三','四','五','六'][d.getDay()];
    const count = log.filter(e => new Date(e.ts).toLocaleDateString('zh-CN') === key && e.msg.includes('Work完成')).length;
    days.push({ label, count });
  }
  return days;
}

// ── Trend (last 7 days) ──
function trendData(log) {
  const pts = [];
  for (let i = 6; i >= 0; i--) {
    const d = new Date(); d.setDate(d.getDate() - i);
    const key = d.toLocaleDateString('zh-CN');
    const count = log.filter(e => new Date(e.ts).toLocaleDateString('zh-CN') === key && e.msg.includes('Work完成')).length;
    pts.push(count);
  }
  return pts;
}

function completedTasks(d) {
  const done = [];
  function walk(list) {
    for (const t of list) {
      if (t.done) done.push(t);
      if (t.children) walk(t.children);
    }
  }
  if (d.tasks) walk(d.tasks);
  return done;
}

// ── Render ──
const totalPom = countPomodoros(log);
const todayPom = todayPomodoros(log);
const weekPom = weekPomodoros(log);
const streak = currentStreak(log);
const focusMin = totalFocusMin(log);
const avgPom = avgPomodorosPerTask(log);
const done = completedTasks(sdata);

document.getElementById('topStats').innerHTML = `
  <div class="stat-card">
    <div class="stat-num">${todayPom}</div>
    <div class="stat-label">🍅 今日番茄</div>
  </div>
  <div class="stat-card">
    <div class="stat-num">${weekPom}</div>
    <div class="stat-label">📅 本周番茄</div>
    <div class="stat-sub">日均 ${(weekPom/7).toFixed(1)} 个</div>
  </div>
  <div class="stat-card">
    <div class="stat-num">${focusMin}</div>
    <div class="stat-label">⏱ 专注分钟</div>
    <div class="stat-sub">约 ${(focusMin/60).toFixed(0)} 小时 · 🟢${countNormalPomodoros(log)} 🟡${countEarlyPomodoros(log)}</div>
  </div>
  <div class="stat-card">
    <div class="stat-num">${streak}</div>
    <div class="stat-label">🔥 连续天数</div>
    <div class="stat-sub">每个番茄 ${avgPom} 个</div>
  </div>
`;

// Weekly
const weekData = weekDaily(log);
const maxCount = Math.max(1, ...weekData.map(d => d.count));
document.getElementById('weekChart').innerHTML = weekData.map(d => {
  const pct = Math.round(d.count / maxCount * 100);
  return `<div class="bar-row">
    <div class="bar-label">周${d.label}</div>
    <div class="bar-track">
      <div class="bar-fill" style="width:${Math.max(pct, d.count>0?6:0)}%; background:linear-gradient(90deg,#7c6ff7,#a78bfa);"><span>${d.count}</span></div>
    </div>
  </div>`;
}).join('') || '<div class="empty">暂无数据</div>';

// Heatmap
const hm = buildHeatmap(log);
const dayNames = ['日','一','二','三','四','五','六'];
const maxHm = Math.max(1, ...hm.flat());
const hmColors = ['#faf8ff','#ede8f8','#c4b5fd','#7c6ff7','#5b21b6'];
document.getElementById('heatmap').innerHTML = '<div class="heatmap">' +
  hm.map((hours, day) => '<div class="heat-col">' +
    hours.slice(6, 23).map((v, h) => {
      const level = v === 0 ? 0 : Math.ceil(v / maxHm * 4);
      return `<div class="heat-cell" style="background:${hmColors[level]}" title="${dayNames[day]} ${h+6}:00 · ${v}🍅"></div>`;
    }).join('') +
  '</div>'
).join('') + '</div>';

// Aggregate focus minutes by day/week/month
function focusByDay(log) {
  const map = {};
  log.forEach(e => {
    const m = e.msg.match(/Work完成.*?(\d+)分钟/);
    if (m) {
      const d = new Date(e.ts).toLocaleDateString('zh-CN');
      map[d] = (map[d]||0) + parseInt(m[1]);
    }
  });
  return map;
}
function focusToday(log) {
  const today = new Date().toLocaleDateString('zh-CN');
  return focusByDay(log)[today] || 0;
}
function focusThisWeek(log) {
  const now = new Date(); const wAgo = new Date(now.getTime()-7*86400000);
  return Object.entries(focusByDay(log))
    .filter(([d]) => new Date(d) >= wAgo)
    .reduce((s,[,v]) => s+v, 0);
}
function focusThisMonth(log) {
  const now = new Date(); const mAgo = new Date(now.getTime()-30*86400000);
  return Object.entries(focusByDay(log))
    .filter(([d]) => new Date(d) >= mAgo)
    .reduce((s,[,v]) => s+v, 0);
}
function focusLast7Days(log) {
  const days = [];
  for (let i=6; i>=0; i--) {
    const d = new Date(); d.setDate(d.getDate()-i);
    const key = d.toLocaleDateString('zh-CN');
    const lbl = ['日','一','二','三','四','五','六'][d.getDay()];
    days.push({ label:lbl, min: focusByDay(log)[key]||0 });
  }
  return days;
}

const fToday = focusToday(log);
const fWeek = focusThisWeek(log);
const fMonth = focusThisMonth(log);
const f7d = focusLast7Days(log);
const fMax = Math.max(1, ...f7d.map(d=>d.min));

// Count normal vs early completions
function countByType(log) {
  let normal=0, early=0;
  log.forEach(e => {
    const m = e.msg.match(/Work完成.*?(\d+)分钟/);
    if (m) {
      if (e.msg.includes('提前结束')) early++; else normal++;
    }
  });
  return { normal, early };
}
const typeCount = countByType(log);

document.getElementById('totalFocus').innerHTML = `
  <div style="text-align:center; padding:16px 0;">
    <div style="display:flex; justify-content:center; gap:20px; margin-bottom:18px;">
      <div style="text-align:center;"><div style="font-size:28px;font-weight:800;color:#7c6ff7;">${(fToday/60).toFixed(1)}h</div><div style="font-size:11px;color:#a89cc4;">今日</div></div>
      <div style="text-align:center;"><div style="font-size:28px;font-weight:800;color:#7c6ff7;">${(fWeek/60).toFixed(1)}h</div><div style="font-size:11px;color:#a89cc4;">本周</div></div>
      <div style="text-align:center;"><div style="font-size:28px;font-weight:800;color:#7c6ff7;">${(fMonth/60).toFixed(0)}h</div><div style="font-size:11px;color:#a89cc4;">本月</div></div>
    </div>
  </div>
`;

// Trend chart
const trend = trendData(log);
const maxTrend = Math.max(1, ...trend);
const trendDays = ['日','一','二','三','四','五','六'];
const today = new Date().getDay();
// Drill-down tree: month → week → day → hour
function buildDrill() {
  const log = filteredLog();
  const focusMap = {}; // key: YYYY-MM-DD-HH → minutes
  log.forEach(e => {
    const m = e.msg.match(/Work完成.*?(\d+)分钟/);
    if (m) {
      const d = new Date(e.ts);
      const keys = [
        d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0'),
        d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-W'+Math.ceil(d.getDate()/7),
        d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'),
        d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0')+'-'+String(d.getHours()).padStart(2,'0')
      ];
      keys.forEach(k => { focusMap[k] = (focusMap[k]||0) + parseInt(m[1]); });
    }
  });
  return focusMap;
}

function renderDrill() {
  const map = buildDrill();
  const months = [...new Set(Object.keys(map).filter(k=>k.match(/^\d{4}-\d{2}$/)).map(k=>k.slice(0,7)))].sort().reverse();
  let html = '';
  months.forEach(ym => {
    const mTotal = map[ym]||0;
    if (mTotal===0) return;
    const mid = ym.replace('-','');
    html += `<div style="margin-bottom:4px;">
      <div onclick="toggleDrill('${mid}')" style="cursor:pointer;display:flex;align-items:center;gap:8px;padding:8px 12px;background:rgba(124,111,247,0.06);border-radius:10px;">
        <span id="arr_${mid}" style="font-size:10px;color:#7c6ff7;">▶</span>
        <span style="font-weight:700;font-size:14px;">${ym.replace('-','年')}月</span>
        <span style="flex:1;"></span>
        <span style="font-weight:700;color:#7c6ff7;">${(mTotal/60).toFixed(1)}h</span>
      </div>
      <div id="sub_${mid}" style="display:none;margin-left:20px;border-left:2px solid #f0eaf8;padding-left:12px;">`;

    // Weeks in this month
    const weeks = [...new Set(Object.keys(map).filter(k=>k.startsWith(ym)&&k.length===9).map(k=>k))].sort();
    weeks.forEach(wk => {
      const wTotal = map[wk]||0;
      if (wTotal===0) return;
      const wid = wk.replace(/-/g,'');
      html += `<div onclick="toggleDrill('${wid}')" style="cursor:pointer;display:flex;align-items:center;gap:8px;padding:6px 0;">
        <span id="arr_${wid}" style="font-size:10px;color:#a89cc4;">▶</span>
        <span style="font-size:13px;">第${wk.split('W')[1]}周</span>
        <span style="flex:1;"></span><span style="color:#7c6ff7;font-weight:600;">${(wTotal/60).toFixed(1)}h</span>
      </div>`;
      html += `<div id="sub_${wid}" style="display:none;margin-left:16px;">`;

      // Days in this week
      const days = [...new Set(Object.keys(map).filter(k=>k.length===10&&k.startsWith(wk.slice(0,7))))].sort();
      days.forEach(dk => {
        const dTotal = map[dk]||0;
        if (dTotal===0) return;
        const did = dk.replace(/-/g,'');
        const d = new Date(dk); const dayNames = ['日','一','二','三','四','五','六'];
        html += `<div onclick="toggleDrill('${did}')" style="cursor:pointer;display:flex;align-items:center;gap:8px;padding:4px 0;">
          <span id="arr_${did}" style="font-size:10px;color:#c8bdd8;">▶</span>
          <span style="font-size:12px;">${dk.slice(5)} 周${dayNames[d.getDay()]}</span>
          <span style="flex:1;"></span><span style="color:#7c6ff7;">${dTotal}分钟</span>
        </div>`;
        html += `<div id="sub_${did}" style="display:none;margin-left:16px;">`;

        // Hours
        for (let h=6; h<24; h++) {
          const hk = dk+'-'+String(h).padStart(2,'0');
          const hTotal = map[hk]||0;
          if (hTotal===0) continue;
          html += `<div style="display:flex;align-items:center;gap:8px;padding:2px 0;font-size:11px;color:#888;">
            <span>${h}:00</span>
            <div style="flex:1;height:4px;background:#ede8f8;border-radius:2px;"><div style="height:100%;width:${Math.min(100,hTotal/60*100)}%;background:#c4b5fd;border-radius:2px;"></div></div>
            <span>${hTotal}分钟</span>
          </div>`;
        }
        html += '</div>';
      });
      html += '</div>';
    });
    html += '</div></div>';
  });
  if (!html) html = '<div class="empty">暂无专注记录</div>';
  document.getElementById('drillDown').innerHTML = html;
}

function toggleDrill(id) {
  const sub = document.getElementById('sub_'+id);
  const arr = document.getElementById('arr_'+id);
  if (sub.style.display === 'none') { sub.style.display = 'block'; arr.textContent = '▼'; }
  else { sub.style.display = 'none'; arr.textContent = '▶'; }
}

document.getElementById('trendChart').innerHTML = trend.length > 0 ? `
  <div style="display:flex; align-items:flex-end; gap:12px; height:100px; justify-content:center;">
    ${trend.map((v, i) => {
      const idx = (today - 6 + i + 7) % 7;
      const h = Math.round(v / maxTrend * 80);
      return `<div style="text-align:center; flex:1; max-width:60px;">
        <div style="font-size:13px; font-weight:600; color:#7c6ff7; margin-bottom:4px;">${v}</div>
        <div style="height:${Math.max(h, v>0?4:2)}px; background:linear-gradient(180deg,#a78bfa,#7c6ff7); border-radius:6px 6px 0 0;"></div>
        <div style="font-size:11px; color:#c8bdd8; margin-top:6px;">周${trendDays[idx]}</div>
      </div>`;
    }).join('')}
  </div>
` : '<div class="empty">暂无数据</div>';

// Task ranks
const ranked = [...(sdata.tasks || [])].filter(t => !t.done).sort((a,b) => b.pct - a.pct).slice(0, 6);
document.getElementById('taskRank').innerHTML = ranked.length > 0
  ? ranked.map(t => {
      const pct = t.children?.length
        ? Math.round(t.children.reduce((s,c)=>s+(c.done?100:c.pct),0)/t.children.length)
        : t.pct;
      return `<div class="bar-row">
        <div class="bar-label">${t.name}</div>
        <div class="bar-track">
          <div class="bar-fill" style="width:${Math.max(pct,5)}%; background:linear-gradient(90deg,#f59e0b,#f97316);"><span>${pct}%</span></div>
        </div>
      </div>`;
    }).join('')
  : '<div class="empty">暂无进行中的任务</div>';
  renderDrill();
}

setRange('today');
</script>
</body>
</html>
