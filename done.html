<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>光阴簿 · 荣誉墙</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;600;700;800&display=swap');
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: "Noto Sans SC", -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
  background: linear-gradient(160deg, #f8f5ff 0%, #eef4ff 30%, #f0f7fb 60%, #faf6ff 100%);
  min-height: 100vh; padding: 32px 20px; color: #1a1333;
  -webkit-font-smoothing: antialiased;
}
.wrap { max-width:680px; margin:0 auto; }
.back-link {
  display:inline-flex; align-items:center; gap:4px; margin-bottom:14px; font-size:13px;
  color:#7c6ff7; text-decoration:none; font-weight:600; padding:6px 12px; border-radius:10px;
  transition:background .15s;
}
.back-link:hover { background:rgba(124,111,247,0.08); }

.card {
  background: rgba(255,255,255,0.75); backdrop-filter: blur(24px);
  border: 1px solid rgba(255,255,255,0.85);
  border-radius: 24px; padding: 32px 36px;
  box-shadow: 0 2px 40px rgba(100,80,180,0.06), 0 0 0 1px rgba(255,255,255,0.9) inset;
}
h1 { font-size:22px; font-weight:800; color:#2d1f4e; margin-bottom:4px; }
.subtitle { font-size:13px; color:#a89cc4; margin-bottom:28px; }

/* Stats row */
.stats { display:flex; gap:20px; margin-bottom:28px; }
.stat { flex:1; background:rgba(124,111,247,0.06); border-radius:14px; padding:16px; text-align:center; }
.stat-num { font-size:32px; font-weight:800; color:#7c6ff7; }
.stat-label { font-size:12px; color:#a89cc4; margin-top:2px; }

/* Timeline */
.timeline { position:relative; padding-left:28px; }
.timeline::before {
  content:''; position:absolute; left:8px; top:4px; bottom:4px;
  width:2px; background:linear-gradient(180deg, #7c6ff7, #e8e0f5 60%, #f4f0fc);
  border-radius:1px;
}

.date-group { margin-bottom:24px; }
.date-label {
  font-size:13px; font-weight:700; color:#7c6ff7; margin-bottom:10px;
  display:flex; align-items:center; gap:8px;
}
.date-label::before {
  content:''; width:10px; height:10px; border-radius:50%;
  background:#7c6ff7; position:absolute; left:4px; margin-top:1px;
}

.entry {
  position:relative; padding:12px 16px; margin-bottom:6px;
  background:#fff; border-radius:12px; border:1px solid #f2eef9;
  transition:all .15s;
}
.entry:hover { border-color:#e2dcf5; box-shadow:0 2px 8px rgba(100,80,180,0.06); }
.entry .e-name { font-size:14px; font-weight:600; color:#2d1f4e; }
.entry .e-time { font-size:11px; color:#c8bdd8; margin-top:2px; }
.entry .e-subs {
  margin-top:6px; padding-top:6px; border-top:1px dashed #f4f0fc;
  display:flex; flex-wrap:wrap; gap:4px;
}
.entry .e-sub {
  font-size:11px; background:rgba(124,111,247,0.06); color:#7c6ff7;
  padding:2px 8px; border-radius:6px;
}

.empty { text-align:center; color:#d5cee0; padding:60px 20px; font-size:15px; }
.empty-icon { font-size:48px; margin-bottom:12px; }
</style>
</head>
<body>
<div class="wrap">

<a class="back-link" href="index.html">
  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
  回到光阴簿
</a>

<div class="card">
  <h1>🏆 荣誉墙</h1>
  <div class="subtitle">所有已完成的任务，按时间排列</div>

  <div class="stats" id="statsRow"></div>
  <div id="timeline"></div>
</div>

</div>

<script src="data.js"></script>
<script>
// Parse done tasks from session log
function getDoneTimeline() {
  const log = JSON.parse(localStorage.getItem('pomotasks_log') || '[]');
  const doneEntries = [];
  const seen = new Set();

  // Reverse to get chronological order
  for (let i = log.length - 1; i >= 0; i--) {
    const e = log[i];
    if (e.msg.includes('🎉 完成 [')) {
      const m = e.msg.match(/🎉 完成 \[(.+?)\]/);
      if (m) {
        const name = m[1];
        const key = name + '|' + e.time;
        if (!seen.has(key)) {
          seen.add(key);
          doneEntries.push({ name, time: e.time, ts: e.ts, subs: [] });
        }
      }
    }
  }

  // Try to enrich with task data (find subtasks)
  try {
    const raw = localStorage.getItem('pomotasks_v2');
    if (raw) {
      const d = JSON.parse(raw);
      function findTask(list, name) {
        for (const t of list) {
          if (t.name === name) return t;
          if (t.children) { const f = findTask(t.children, name); if (f) return f; }
        }
        return null;
      }
      doneEntries.forEach(e => {
        const t = findTask(d.tasks || [], e.name);
        if (t && t.children && t.children.length > 0) {
          e.subs = t.children.filter(c => c.done).map(c => c.name);
        }
      });
    }
  } catch(ex) {}

  return doneEntries;
}

function fmtDate(d) {
  const now = new Date();
  const date = new Date(d);
  const diff = Math.floor((now - date) / 86400000);
  if (diff === 0) return '今天';
  if (diff === 1) return '昨天';
  if (diff < 7) return diff + '天前';
  return (date.getMonth()+1) + '月' + date.getDate() + '日';
}

function groupByDate(entries) {
  const groups = {};
  entries.forEach(e => {
    const d = new Date(e.ts);
    const key = d.toLocaleDateString('zh-CN');
    if (!groups[key]) groups[key] = { date: d, entries: [] };
    groups[key].entries.push(e);
  });
  return Object.values(groups).sort((a, b) => b.date - a.date);
}

function renderWall() {
  const done = getDoneTimeline();
  const total = done.length;

  // Stats
  const thisWeek = done.filter(e => {
    const now = new Date(), d = new Date(e.ts);
    return (now - d) / 86400000 < 7;
  }).length;

  document.getElementById('statsRow').innerHTML = `
    <div class="stat">
      <div class="stat-num">${total}</div>
      <div class="stat-label">🏆 总计完成</div>
    </div>
    <div class="stat">
      <div class="stat-num">${thisWeek}</div>
      <div class="stat-label">📅 本周完成</div>
    </div>
    <div class="stat">
      <div class="stat-num">${total > 0 ? Math.round(thisWeek/total*100) : 0}%</div>
      <div class="stat-label">📊 本周占比</div>
    </div>
  `;

  // Timeline
  const tl = document.getElementById('timeline');
  if (done.length === 0) {
    tl.innerHTML = '<div class="empty"><div class="empty-icon">🏆</div>还没有完成的任务<br>去光阴簿开始第一个番茄吧</div>';
    return;
  }

  const groups = groupByDate(done);
  tl.innerHTML = '<div class="timeline">' + groups.map(g => `
    <div class="date-group">
      <div class="date-label">${fmtDate(g.date)}</div>
      ${g.entries.map(e => `
        <div class="entry">
          <div class="e-name">${e.name}</div>
          <div class="e-time">${e.time}</div>
          ${e.subs.length > 0 ? `
            <div class="e-subs">
              ${e.subs.map(s => `<span class="e-sub">✓ ${s}</span>`).join('')}
            </div>
          ` : ''}
        </div>
      `).join('')}
    </div>
  `).join('') + '</div>';
}

renderWall();
</script>
</body>
</html>
